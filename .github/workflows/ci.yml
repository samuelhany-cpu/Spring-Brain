name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Backend — Maven Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        run: mvn --batch-mode --no-transfer-progress test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            spring-brain-core/target/surefire-reports/
            spring-brain-cli/target/surefire-reports/
          retention-days: 7

  frontend:
    name: Frontend — Viewer Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: spring-brain-viewer/package-lock.json

      - name: Install dependencies
        working-directory: spring-brain-viewer
        run: npm ci

      - name: Build
        working-directory: spring-brain-viewer
        run: npm run build

      - name: Unit tests
        working-directory: spring-brain-viewer
        run: npm run test
